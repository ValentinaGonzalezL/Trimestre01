<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración Empresa</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>SoftEmploy</h2>

    <nav>
      <a class="active" href="empresainicio.html">Inicio</a>
      <a href="publicar-vacante.html">Publicar vacante</a>
      <a href="vacantes.html">Mis vacantes</a>
      <a href="postulaciones.html">Postulaciones</a>
      <a href="mensajesempresa.html">Mensajes</a>
      <a href="configuracion.html">Configuración</a>
      <a href="login-empresa.html">Cerrar sesión</a>
    </nav>
  </aside>

  <!-- CONTENIDO -->
  <main class="main">

    <header class="topbar">
      <h3>Configuración de Empresa</h3>
    </header>

    <section class="config-container">

      <!-- PERFIL EMPRESA -->
      <div class="config-card">

        <h2>Datos de la empresa</h2>

        <label>Nombre de la empresa</label>
        <input type="text" placeholder="Ej: TechSoft">

        <label>Correo corporativo</label>
        <input type="email" placeholder="empresa@email.com">

        <label>Teléfono</label>
        <input type="text" placeholder="300 000 0000">

        <label>Descripción</label>
        <textarea placeholder="Describe tu empresa..."></textarea>

        <button class="btn-save">Guardar cambios</button>

      </div>

      <!-- SEGURIDAD -->
      <div class="config-card">

        <h2>Seguridad</h2>

        <label>Contraseña actual</label>
        <input type="password">

        <label>Nueva contraseña</label>
        <input type="password">

        <label>Confirmar contraseña</label>
        <input type="password">

        <button class="btn-save">Actualizar contraseña</button>

      </div>

    </section>

  </main>

</div>

</body>
</html>
