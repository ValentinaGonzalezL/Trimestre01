<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoja de Vida</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">


  <aside class="sidebar">
    <h2>SoftEmploy</h2>

    <nav>
      <a href="postulanteinicio.html">Inicio</a>
      <a href="empleos.html">Empleos</a>
      <a class="active" href="hoja-vida.html">Hoja de vida</a>
      <a href="mensajespostulante.html">Mensajes</a>
      <a href="notificacionespostulante.html">Notificaciones</a>
      <a href="perfil.html">Perfil</a>
      <a href="login-postulante.html">Cerrar sesión</a>
    </nav>
  </aside>


  <main class="main">

    <header class="topbar">
      <h3>Mi Hoja de Vida</h3>
    </header>

    <section class="cv-container">

      <form class="cv-form">

        <h2>Datos personales</h2>

        <label>Nombre completo</label>
        <input type="text" placeholder="Tu nombre">

        <label>Email</label>
        <input type="email" placeholder="correo@email.com">

        <label>Teléfono</label>
        <input type="text" placeholder="Tu número">

        <h2>Experiencia laboral</h2>

        <textarea placeholder="Describe tu experiencia..."></textarea>

        <h2>Educación</h2>

        <textarea placeholder="Estudios realizados..."></textarea>

        <h2>Habilidades</h2>

        <input type="text" placeholder="Ej: HTML, CSS, JS">

        <button type="button" class="btn-register">
          Guardar CV
        </button>

      </form>

    </section>

  </main>

</div>

</body>
</html>
