<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Empresa</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

<div class="login-container">

  <div class="login-left" style="background:#7b0f2a;">
    <h1>Empresa</h1>
    <p>Publica vacantes y encuentra talento</p>
  </div>

  <div class="login-right">

    <div class="login-box">

      <h2>Iniciar sesión</h2>

      <form>
        <label>Correo</label>
        <input type="email" placeholder="empresa@email.com">

        <label>Contraseña</label>
        <input type="password" placeholder="••••••">

        <a class="btn-login" href="empresainicio.html">Entrar</a>
      </form>

      <p>
        ¿No tienes cuenta?
        <a href="registro-empresa.html">Regístrate</a>
      </p>

    </div>

  </div>

</div>

</body>
</html>
