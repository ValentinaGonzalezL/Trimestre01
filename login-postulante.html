<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - SoftEmploy</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

  <div class="login-container">


    <div class="login-left">
      <h1>Bienvenido de nuevo</h1>
      <p>Accede a tu cuenta para continuar</p>
    </div>


    <div class="login-right">

      <div class="login-box">

        <div class="tabs">
          <button class="tab active">Postulante</button>
          <a class="tab" href="login-empresa.html">Empresa</a>
        </div>

        <form>
          <label>Correo electrónico</label>
          <input type="email" placeholder="Ingresa tu correo">

          <label>Contraseña</label>
          <input type="password" placeholder="Ingresa tu contraseña">

          <a class="btn-login" href="postulanteinicio.html">Entrar</a>

          <div class="links">
            <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
            <a href="registro-postulante.html">Registrarte</a>
          </div>
        </form>

      </div>

    </div>

  </div>

</body>
</html>
