<div class="dashboard">

      <div class="chat-list">

        <div class="chat-user active">
          <h4>Juan Pérez</h4>

        <div class="messages">

          <div class="msg right">
            Hola Juan, vimos tu perfil 👍
          </div>

          </div>

        </div>


        <div class="chat-input">

        </div>

      </div>

    </section>
