<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensajes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">


  <aside class="sidebar">
    <h2>SoftEmploy</h2>

    <nav>
      <a href="postulanteinicio.html">Inicio</a>
      <a href="empleos.html">Empleos</a>
      <a href="hoja-vida.html">Hoja de vida</a>
      <a class="active" href="mensajespostulante.html">Mensajes</a>
      <a href="notificacionespostulante.html">Notificaciones</a>
      <a href="perfil.html">Perfil</a>
      <a href="login-postulante.html">Cerrar sesión</a>
    </nav>
  </aside>


  <main class="main">

    <header class="topbar">
      <h3>Mensajes</h3>
    </header>

    <section class="chat-container">

 
      <div class="chat-list">

        <div class="chat-user active">
          <h4>Empresa TechSoft</h4>
          <p>Último mensaje...</p>
        </div>

        <div class="chat-user">
          <h4>Empresa DesignCo</h4>
          <p>Hola, vimos tu CV</p>
        </div>

      </div>

 
      <div class="chat-box">

        <div class="messages">

          <div class="msg left">
            Hola, vimos tu perfil 👋
          </div>

          <div class="msg right">
            Muchas gracias por contactarme
          </div>

          <div class="msg left">
            ¿Tienes disponibilidad inmediata?
          </div>

        </div>

     
        <div class="chat-input">
          <input type="text" placeholder="Escribe un mensaje...">
          <button>Enviar</button>
        </div>

      </div>

    </section>

  </main>

</div>

</body>
</html>
