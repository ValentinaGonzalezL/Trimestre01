<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Postulante</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>SoftEmploy</h2>

    <nav>
      <a href="postulanteinicio.html">Inicio</a>
      <a href="empleos.html">Empleos</a>
      <a href="hoja-vida.html">Hoja de vida</a>
      <a class="active" href="mensajespostulante.html">Mensajes</a>
      <a href="notificacionespostulante.html">Notificaciones</a>
      <a href="perfil.html">Perfil</a>
      <a href="login-postulante.html">Cerrar sesión</a>
    </nav>
  </aside>

  <!-- CONTENIDO -->
  <main class="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <h3>Bienvenido, Usuario</h3>
      <div class="user">👤</div>
    </header>

    <!-- CARDS -->
    <section class="cards">

      <div class="card">
        <h3>Empleos disponibles</h3>
        <p>120 nuevas ofertas</p>
      </div>

      <div class="card">
        <h3>Postulaciones</h3>
        <p>5 en proceso</p>
      </div>

      <div class="card">
        <h3>Mensajes</h3>
        <p>2 sin leer</p>
      </div>

    </section>

    <!-- LISTA DE EMPLEOS -->
    <section class="jobs">
      <h2>Últimas ofertas</h2>

      <div class="job-card">
        <h4>Desarrollador Web</h4>
        <p>Empresa XYZ - Remoto</p>
        <button>Ver más</button>
      </div>

      <div class="job-card">
        <h4>Diseñador UI</h4>
        <p>Agencia Creativa - Bogotá</p>
        <button>Ver más</button>
      </div>

    </section>

  </main>

</div>

</body>
</html>
