<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar Vacante</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">


  <aside class="sidebar">
    <h2>SoftEmploy</h2>

    <nav>
      <a class="active" href="empresainicio.html">Inicio</a>
      <a href="publicar-vacante.html">Publicar vacante</a>
      <a href="vacantes.html">Mis vacantes</a>
      <a href="postulaciones.html">Postulaciones</a>
      <a href="mensajesempresa.html">Mensajes</a>
      <a href="configuracion.html">Configuración</a>
      <a href="login-empresa.html">Cerrar sesión</a>
    </nav>
  </aside>

  
  <main class="main">

    <header class="topbar">
      <h3>Publicar nueva vacante</h3>
    </header>

    <section class="form-container">

      <form class="form">

        <label>Título del puesto</label>
        <input type="text" placeholder="Ej: Desarrollador Web">

        <label>Descripción</label>
        <textarea placeholder="Describe el trabajo..."></textarea>

        <label>Requisitos</label>
        <textarea placeholder="Ej: HTML, CSS, JavaScript"></textarea>

        <label>Ubicación</label>
        <input type="text" placeholder="Ciudad o remoto">

        <label>Salario</label>
        <input type="text" placeholder="Ej: $1.500.000">

        <button type="button" class="btn-register">
          Publicar vacante
        </button>

      </form>

    </section>

  </main>

</div>

</body>
</html>
