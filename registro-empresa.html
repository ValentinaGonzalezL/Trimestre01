<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Empresa</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="register-body">

<div class="register-container">

  <div class="register-left" style="background:#7b0f2a;">
    <h1>Crear cuenta</h1>
    <p>Empresa</p>
  </div>

  <div class="register-right">

    <div class="register-box">

      <form>
        <label>Nombre empresa</label>
        <input type="text">

        <label>Correo</label>
        <input type="email">

        <label>Contraseña</label>
        <input type="password">

        <a class="btn-register" href="empresainicio.html">Crear cuenta</a>
      </form>

      <p>
        ¿Ya tienes cuenta?
        <a href="login-empresa.html">Inicia sesión</a>
      </p>

    </div>

  </div>

</div>

</body>
</html>
