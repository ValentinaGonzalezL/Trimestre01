<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - SoftEmploy</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="register-body">

  <div class="register-container">

    <!-- LADO IZQUIERDO -->
    <div class="register-left">
      <h1>Crea tu cuenta</h1>
      <p>Encuentra oportunidades laborales rápidamente</p>
    </div>

    <!-- FORMULARIO -->
    <div class="register-right">

      <div class="register-box">

        <!-- TABS -->
        <div class="tabs">
          <button class="tab active">Postulante</button>
          <a class="btn-register" href="registro-empresa.html">Empresa</a>
        </div>

        <form>
          <div class="row">
            <div>
              <label>Nombres</label>
              <input type="text" placeholder="Tus nombres">
            </div>

            <div>
              <label>Apellidos</label>
              <input type="text" placeholder="Tus apellidos">
            </div>
          </div>

          <label>Correo electrónico</label>
          <input type="email" placeholder="correo@email.com">

          <label>Contraseña</label>
          <input type="password" placeholder="Crea una contraseña">

          <label>Confirmar contraseña</label>
          <input type="password" placeholder="Repite la contraseña">

          <a class="btn-register" href="postulanteinicio.html">Crear cuenta</a>

          <p class="login-link">
            ¿Ya tienes cuenta? <a href="login-postulante.html">Inicia sesión</a>
          </p>

        </form>

      </div>

    </div>

  </div>

</body>
</html>
