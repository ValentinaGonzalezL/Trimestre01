<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Vacantes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

 
  <aside class="sidebar">
    <h2>SoftEmploy</h2>

    <nav>
      <a class="active" href="empresainicio.html">Inicio</a>
      <a href="publicar-vacante.html">Publicar vacante</a>
      <a href="vacantes.html">Mis vacantes</a>
      <a href="postulaciones.html">Postulaciones</a>
      <a href="mensajesempresa.html">Mensajes</a>
      <a href="configuracion.html">Configuración</a>
      <a href="login-empresa.html">Cerrar sesión</a>
    </nav>
  </aside>

 
  <main class="main">

    <header class="topbar">
      <h3>Mis vacantes</h3>
    </header>

    <section class="vacantes-container">

     
      <div class="vacante-card">

        <div class="vacante-header">
          <h3>Desarrollador Web</h3>

          <select class="estado">
            <option>Activa</option>
            <option>Pausada</option>
            <option>Cerrada</option>
          </select>
        </div>

        <p><strong>Postulantes:</strong> 12</p>
        <p><strong>Ubicación:</strong> Remoto</p>

        <div class="actions">
          <button class="btn-view">👁 Ver</button>
          <button class="btn-edit">✏ Editar</button>
          <button class="btn-delete" onclick="confirm('¿Eliminar vacante?')">
            🗑 Eliminar
          </button>
        </div>

      </div>

      
      <div class="vacante-card">

        <div class="vacante-header">
          <h3>Diseñador UI/UX</h3>

          <select class="estado">
            <option>Activa</option>
            <option>Pausada</option>
            <option>Cerrada</option>
          </select>
        </div>

        <p><strong>Postulantes:</strong> 8</p>
        <p><strong>Ubicación:</strong> Bogotá</p>

        <div class="actions">
          <button class="btn-view">👁 Ver</button>
          <button class="btn-edit">✏ Editar</button>
          <button class="btn-delete" onclick="confirm('¿Eliminar vacante?')">
            🗑 Eliminar
          </button>
        </div>

      </div>

    </section>

  </main>

</div>

</body>
</html>
